<!--
  =====================================================
  檔案名稱：staff-login.component.html
  用途說明：管理系統登入頁面的 HTML 結構
  包含區塊：頂部導覽列、左側品牌欄、右側登入表單
  Angular 知識點：
    - [routerLink]       是 Angular 的頁面導覽指令，點擊後切換到指定路由
    - [class.active]     是 Angular 的條件綁定，當 activeRole === 'M' 時加上 active class
    - (click)            是 Angular 的事件綁定，點擊時呼叫 TypeScript 裡的方法
    - [type]             動態綁定 input 的 type 屬性（在 password 與 text 之間切換）
    - @if (條件) { }     Angular 17+ 內建控制流語法，不需要額外 import，取代舊版 *ngIf
    - [attr.aria-label]  動態綁定無障礙標籤，讓螢幕閱讀器知道按鈕用途
  =====================================================
-->

<!-- ===================================================
   頂部導覽列：讓 Demo 時可以切換到客戶登入頁面
   nav-staff 沒有 [routerLink] 表示這是當前頁面，點了不跳轉
   =================================================== -->
<nav class="mode-nav">
  <a class="nav-staff">⚙ 管理系統</a>
  <!-- (click)="goToCustomer()" 觸發 TypeScript 的方法，先顯示 Loading 再切換頁面 -->
  <a class="nav-customer" (click)="goToCustomer()">🍜 客戶入口</a>
</nav>

<!-- ===================================================
   主框架：包住整個登入卡片的外殼容器
   =================================================== -->
<div class="shell">
  <!-- 面板：使用 CSS Grid 分成左右兩欄 -->
  <div class="panel" id="staff-panel">
    <!-- ===================================================
       左側品牌欄：深色背景，顯示 Logo、品牌名稱、系統資訊
       =================================================== -->
    <aside class="s-left">
      <!-- 第一區塊：Logo 圖片容器（佔左欄 1/3 高度） -->
      <div class="s-logo-box">
        <img src="assets/Logo.png" alt="懶飽飽 Logo" />
      </div>

      <!-- 第二區塊：品牌名稱文字（佔左欄 1/3 高度） -->
      <div class="s-brand">
        <div class="s-brand-en">LazyBaoBao</div>
        <div class="s-brand-zh">登入系統</div>
        <div class="s-brand-tag">POS Management System</div>
      </div>

      <!-- 第三區塊：系統資訊列（佔左欄 1/3 高度） -->
      <div class="s-stats">
        <div class="s-stat-row">
          <span class="s-stat-icon">🖥</span>
          <span class="s-stat-text">系統版本</span>
          <span class="s-stat-val">v2.4.1</span>
        </div>

        <div class="s-stat-row">
          <span class="s-stat-icon">🔒</span>
          <span class="s-stat-text">安全連線</span>
          <span class="s-stat-val">TLS 1.3</span>
        </div>

        <div class="s-stat-row">
          <span class="s-stat-icon">📍</span>
          <span class="s-stat-text">分店節點</span>
          <span class="s-stat-val">台灣 主機</span>
        </div>
      </div>
    </aside>
    <!-- 左側品牌欄結束 -->

    <!-- ===================================================
       右側表單欄：白色背景，放置登入表單
       =================================================== -->
    <section class="s-right">
      <!-- 表單頂部標題 -->
      <div class="s-form-header">
        <h3>管理人員登入</h3>
        <p>請輸入您的管理帳號以開始後台操作</p>
      </div>

      <!-- 角色切換分頁：經理 / 分店長 / 現場收銀員 -->
      <div class="s-role-tabs">
        <button [class.active]="activeRole === 'M'" (click)="setRole('M')">
          經理
        </button>
        <button [class.active]="activeRole === 'B'" (click)="setRole('B')">
          分店長
        </button>
        <button [class.active]="activeRole === 'S'" (click)="setRole('S')">
          現場收銀員
        </button>
      </div>

      <!-- 帳號輸入欄位 -->
      <div class="s-field">
        <label>
          <span class="dot"></span>
          帳號
        </label>
        <!-- [(ngModel)] 雙向綁定到 TypeScript 的 email 屬性 -->
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="請輸入登入電子郵件"
          autocomplete="email"
        />
      </div>

      <!-- 密碼輸入欄位（含顯示 / 隱藏眼睛切換按鈕） -->
      <div class="s-field">
        <label>
          <span class="dot"></span>
          安全密碼
        </label>

        <!-- s-password-wrap：相對定位容器，讓眼睛按鈕可以絕對定位在輸入框右側 -->
        <div class="s-password-wrap">
          <!-- [(ngModel)] 雙向綁定到 TypeScript 的 password 屬性 -->
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="請輸入登入密碼"
            autocomplete="current-password"
          />

          <!-- 眼睛切換按鈕
               [class.is-visible]  當密碼顯示中時加上 is-visible class（金黃色高亮）
               type="button"       防止觸發表單送出
               aria-label          無障礙標籤，讓螢幕閱讀器說出按鈕功能 -->
          <button
            type="button"
            class="s-eye-btn"
            [class.is-visible]="showPassword"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword ? '隱藏密碼' : '顯示密碼'"
          >
            <!-- 眼睛「睜開」圖示：密碼隱藏中時顯示
                 @if 是 Angular 17+ 的內建控制流，不需要 import NgIf -->
            @if (!showPassword) {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }

            <!-- 眼睛「閉上」圖示：密碼顯示中時顯示（有一條斜線穿過） -->
            @if (showPassword) {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                />
                <path
                  d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                />
                <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- 錯誤訊息（loginError 不為 null 時顯示） -->
      @if (errorMsg) {
        <p class="s-error-msg">{{ errorMsg }}</p>
      }

      <!-- 登入按鈕 — (click) 呼叫 submitLogin() 驗證並導向後台 -->
      <button class="s-submit" (click)="submitLogin()">
        進入管理後台 <span class="arrow">→</span>
      </button>

      <!-- 底部法律聲明文字 -->
      <p class="s-footer-note">僅限授權人員登入 · 所有操作均受稽核記錄</p>
    </section>
    <!-- 右側表單欄結束 -->
  </div>
  <!-- 面板結束 -->
</div>
<!-- 主框架結束 -->
